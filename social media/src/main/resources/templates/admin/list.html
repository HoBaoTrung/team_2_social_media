<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Danh sách Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
  <h2>Danh sách Admin</h2>
  <a href="/admin/create" class="btn btn-success mb-3">+ Thêm Admin</a>
  <table class="table table-striped">
    <thead class="table-dark">
    <tr>
      <th>ID</th>
      <th>Họ tên</th>
      <th>Email</th>
      <th>Quyền</th>
      <th>Ngày tạo</th>
      <th>Hành động</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="a : ${admins}">
      <td th:text="${a.id}"></td>
      <td th:text="${a.fullName}"></td>
      <td th:text="${a.email}"></td>
      <td th:text="${a.role}"></td>
      <td th:text="${#temporals.format(a.createdAt, 'dd/MM/yyyy HH:mm')}"></td>
      <td>
        <a th:href="@{'/admin/edit/' + ${a.id}}" class="btn btn-warning btn-sm">Sửa</a>
        <a th:href="@{'/admin/delete/' + ${a.id}}" class="btn btn-danger btn-sm"
           onclick="return confirm('Xóa admin này?')">Xóa</a>
      </td>
    </tr>
    </tbody>
  </table>
</div>
</body>
</html>
