<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Lịch sử quản trị</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
  <h2>Lịch sử quản trị</h2>
  <table class="table table-bordered">
    <thead class="table-dark">
    <tr>
      <th>ID</th>
      <th>Người bị tác động</th>
      <th>Hành động</th>
      <th>Ghi chú</th>
      <th>Ngày thực hiện</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="log : ${logs}">
      <td th:text="${log.id}"></td>
      <td th:text="${log.targetUser != null ? log.targetUser.fullName : 'N/A'}"></td>
      <td th:text="${log.actionType}"></td>
      <td th:text="${log.adminNote}"></td>
      <td th:text="${#temporals.format(log.actionDate, 'dd/MM/yyyy HH:mm')}"></td>
    </tr>
    </tbody>
  </table>
</div>
</body>
</html>
