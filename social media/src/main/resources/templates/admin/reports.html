<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Quản lý báo cáo</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
  <h2>Danh sách báo cáo</h2>
  <table class="table table-striped">
    <thead class="table-dark">
    <tr>
      <th>ID</th>
      <th>Người báo cáo</th>
      <th>Loại</th>
      <th>Lý do</th>
      <th>Ngày tạo</th>
      <th>Trạng thái</th>
      <th>Hành động</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="r : ${reports}">
      <td th:text="${r.id}"></td>
      <td th:text="${r.reporter != null ? r.reporter.fullName : 'N/A'}"></td>
      <td th:text="${r.reportType}"></td>
      <td th:text="${r.reason}"></td>
      <td th:text="${#temporals.format(r.createdAt, 'dd/MM/yyyy HH:mm')}"></td>
      <td>
        <span th:if="${r.status.name() == 'PENDING'}" class="badge bg-warning text-dark">Chờ xử lý</span>
        <span th:if="${r.status.name() == 'RESOLVED'}" class="badge bg-success">Đã xử lý</span>
      </td>
      <td>
        <form th:action="@{/admin/reports/{id}/resolve(id=${r.id})}" method="post" class="d-inline">
          <input type="hidden" name="note" value="Đã xử lý">
          <input type="hidden" name="action" value="NO_ACTION">
          <input type="hidden" name="adminId" value="1">
          <button class="btn btn-sm btn-primary" th:disabled="${r.status.name() == 'RESOLVED'}">Xử lý</button>
        </form>
      </td>
    </tr>
    </tbody>
  </table>
</div>
</body>
</html>
