<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Thêm Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
  <h2>Thêm Admin</h2>
  <form th:action="@{/admin/create}" th:object="${admin}" method="post">
    <div class="mb-3">
      <label>Email</label>
      <input type="email" th:field="*{email}" class="form-control" required>
    </div>
    <div class="mb-3">
      <label>Họ tên</label>
      <input type="text" th:field="*{fullName}" class="form-control" required>
    </div>
    <div class="mb-3">
      <label>Mật khẩu</label>
      <input type="password" th:field="*{passwordHash}" class="form-control" required>
    </div>
    <div class="mb-3">
      <label>Vai trò</label>
      <select th:field="*{role}" class="form-select">
        <option value="SUPER_ADMIN">SUPER_ADMIN</option>
        <option value="ADMIN">ADMIN</option>
      </select>
    </div>
    <button class="btn btn-success">Lưu</button>
    <a href="/admin" class="btn btn-secondary">Hủy</a>
  </form>
</div>
</body>
</html>
